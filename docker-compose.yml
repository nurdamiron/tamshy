services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: tamshy
      POSTGRES_PASSWORD: tamshy
      POSTGRES_DB: tamshy
    volumes:
      - tamshy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tamshy -d tamshy']
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  tamshy_pgdata:
