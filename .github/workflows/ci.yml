name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  # ── Check env vars ────────────────────────────────────────────────────────
  check-env:
    name: Check env vars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Validate required env vars
        run: npx tsx scripts/check-env.ts --env production
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME:    ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          MOBIZON_API_KEY:       ${{ secrets.MOBIZON_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check-env
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Next.js build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL:   ${{ secrets.DATABASE_URL }}
          JWT_SECRET:   ${{ secrets.JWT_SECRET }}
          AWS_REGION:   ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME:    ${{ secrets.AWS_S3_BUCKET_NAME }}
          APP_ENV:               production
          NEXT_PUBLIC_APP_URL:   https://tamshy.vercel.app

  # ── Деплой ────────────────────────────────────────────────────────────────
  # Vercel Git Integration автоматически деплоит каждый push в main
  # (настройка в vercel.com/dashboard).
  #
  # ── Schema migrations ─────────────────────────────────────────────────────
  # `prisma db push` НЕ выполняется в CI — он опасен в prod (может дропнуть
  # колонки/индексы) и требует master-прав, которые есть только у prometric
  # (app user tamshy не owns таблицы).
  #
  # Миграции применяем вручную через psql от prometric:
  #   psql "$DIRECT_URL" -f prisma/migrations/<timestamp>_<name>/migration.sql
  #
  # См. docs/qazsu-rds-runbook.md для пошагового процесса.
