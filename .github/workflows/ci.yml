name: CI / Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Проверка env переменных ───────────────────────────────────────────
  check-env:
    name: Check env vars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Check required env vars (staging)
        if: github.ref == 'refs/heads/staging'
        run: npx tsx scripts/check-env.ts --env staging
        env:
          DATABASE_URL:             ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET:               ${{ secrets.STAGING_JWT_SECRET }}
          AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME:       ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_REGION:               ${{ secrets.AWS_REGION }}

      - name: Check required env vars (production)
        if: github.ref == 'refs/heads/main'
        run: npx tsx scripts/check-env.ts --env production
        env:
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          JWT_SECRET:               ${{ secrets.JWT_SECRET }}
          AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME:       ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_REGION:               ${{ secrets.AWS_REGION }}
          MOBIZON_API_KEY:          ${{ secrets.MOBIZON_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

  # ── 2. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check-env
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build (staging)
        if: github.ref == 'refs/heads/staging'
        run: npm run build
        env:
          APP_ENV:                  staging
          DATABASE_URL:             ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL:               ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET:               ${{ secrets.STAGING_JWT_SECRET }}
          AWS_REGION:               ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME:       ${{ secrets.AWS_S3_BUCKET_NAME }}
          NEXT_PUBLIC_APP_URL:      https://staging.tamshy.kz

      - name: Build (production)
        if: github.ref == 'refs/heads/main'
        run: npm run build
        env:
          APP_ENV:                  production
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          DIRECT_URL:               ${{ secrets.DIRECT_URL }}
          JWT_SECRET:               ${{ secrets.JWT_SECRET }}
          AWS_REGION:               ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME:       ${{ secrets.AWS_S3_BUCKET_NAME }}
          NEXT_PUBLIC_APP_URL:      https://tamshy.kz

  # ── 3. DB миграции ───────────────────────────────────────────────────────
  db-migrate:
    name: DB push (schema sync)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Push schema (staging)
        if: github.ref == 'refs/heads/staging'
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL:   ${{ secrets.STAGING_DATABASE_URL }}

      - name: Push schema (production)
        if: github.ref == 'refs/heads/main'
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL:   ${{ secrets.DIRECT_URL }}

  # ── 4. Deploy to Vercel ──────────────────────────────────────────────────
  deploy:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: db-migrate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install -g vercel@latest

      - name: Deploy staging
        if: github.ref == 'refs/heads/staging'
        run: vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
